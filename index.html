  <style>
    /* Smooth fade-in once Flutter has painted its first frame, so the
       page doesn't pop in abruptly. */
    html, body { background: #F7F8FA; }
    #app-loading-fade {
      position: fixed; inset: 0; background: #F7F8FA;
      z-index: 9999; opacity: 1; transition: opacity 500ms ease;
      pointer-events: none;
    }
    #app-loading-fade.hidden { opacity: 0; }
  </style>
</head>
<body>
  <div id="app-loading-fade"></div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Fade the cover div out shortly after first paint, revealing the
    // Flutter app underneath with a smooth transition instead of a hard cut.
    window.addEventListener('load', function () {
      setTimeout(function () {
        var el = document.getElementById('app-loading-fade');
        if (el) {
          el.classList.add('hidden');
          setTimeout(function () { el.remove(); }, 600);
        }
      }, 300);
    });
  </script>
</body>
